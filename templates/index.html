<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Pipeline Generator AI</title>

<link rel="stylesheet"
      href="{{ url_for('static', filename='chat.css') }}">

<script src="https://cdn.jsdelivr.net/npm/js-yaml@4/dist/js-yaml.min.js"></script>

</head>

<body>

<div class="app-container">

  <!-- ===================================== -->
  <!-- TOPBAR -->
  <!-- ===================================== -->
  <header class="topbar">

    <div class="logo">
      🚀 Pipeline Generator AI
    </div>

    <div class="top-actions">

      <label>
        Provider
      </label>

      <select id="provider">

        <option value="auto">
          🤖 Auto
        </option>

        <option value="groq">
          ⚡ Groq
        </option>

        <option value="openai">
          🧠 OpenAI
        </option>

        <option value="local">
          💻 Local
        </option>

      </select>

    </div>

  </header>

  <!-- ===================================== -->
  <!-- MESSAGES -->
  <!-- ===================================== -->
  <main id="messages"></main>

  <!-- ===================================== -->
  <!-- INPUT -->
  <!-- ===================================== -->
  <footer class="input-wrapper">

    <div class="input-area">

      <textarea
        id="chatInput"
        placeholder="Descreva o pipeline desejado..."
      ></textarea>

      <button id="sendBtn">
        🚀 Gerar Pipeline
      </button>

    </div>

  </footer>

</div>

<script src="{{ url_for('static', filename='chat.js') }}"></script>

</body>

</html>
